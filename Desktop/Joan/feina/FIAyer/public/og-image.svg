<?xml version="1.0" encoding="UTF-8"?>
<!--
  Source artwork for the OpenGraph / Twitter card image.
  Before launch, export this as /public/og-image.png at 1200x630 px so it
  matches the <meta property="og:image" content="/og-image.png"> tag in index.html.
  (Facebook / LinkedIn cards often reject SVG.)

  Export instructions:
    1) Open this file in any SVG editor (Figma, Illustrator, Inkscape) or
       run: npx @resvg/resvg-js og-image.svg og-image.png
    2) Save as public/og-image.png.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7F0EB" />
      <stop offset="100%" stop-color="#E8DED1" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3E86C1" />
      <stop offset="100%" stop-color="#2e6896" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative sparkles -->
  <g fill="#3E86C1" opacity="0.15">
    <circle cx="90" cy="110" r="6" />
    <circle cx="1080" cy="540" r="8" />
    <circle cx="1100" cy="90" r="5" />
    <circle cx="180" cy="520" r="4" />
  </g>

  <!-- Little colored chips to hint at flyer designs -->
  <g>
    <rect x="870" y="90" width="230" height="160" rx="18" fill="#fff" stroke="#3E86C1" stroke-width="2" />
    <rect x="890" y="110" width="140" height="14" rx="4" fill="#3E86C1" />
    <rect x="890" y="135" width="190" height="8" rx="4" fill="#061A12" opacity="0.5" />
    <rect x="890" y="152" width="170" height="8" rx="4" fill="#061A12" opacity="0.3" />
    <rect x="890" y="185" width="80" height="30" rx="15" fill="#3E86C1" />

    <rect x="870" y="380" width="230" height="160" rx="18" fill="#fff" stroke="#061A12" stroke-width="2" opacity="0.9" transform="rotate(4 985 460)" />
    <rect x="890" y="400" width="100" height="14" rx="4" fill="#061A12" transform="rotate(4 985 460)" />
    <rect x="890" y="425" width="190" height="8" rx="4" fill="#061A12" opacity="0.5" transform="rotate(4 985 460)" />
  </g>

  <!-- Headline -->
  <g font-family="'Inter', 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="80" y="160" font-size="36" font-weight="600" fill="#3E86C1" letter-spacing="6">
      ✦  FLYERS CON IA
    </text>

    <text x="80" y="280" font-size="88" font-weight="800" fill="#061A12" letter-spacing="-3">
      Crea flyers
    </text>
    <text x="80" y="380" font-size="88" font-weight="800" fill="#061A12" letter-spacing="-3">
      profesionales
    </text>
    <text x="80" y="480" font-size="88" font-weight="800" fill="url(#accent)" letter-spacing="-3">
      en segundos.
    </text>

    <text x="80" y="560" font-size="30" font-weight="500" fill="#061A12" opacity="0.65">
      fiayer.com · Listos para imprimir · PDF · PNG · JPG
    </text>
  </g>

  <!-- Brand mark -->
  <g transform="translate(80, 540)">
    <rect x="0" y="0" width="0" height="0" />
  </g>
</svg>
